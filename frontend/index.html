<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري - الصفحة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1200x400'); background-size: cover; color: white; padding: 100px 0; text-align: center; }
        
        /* تصميم الكارد الاحترافي */
        .product-card { border: none; border-radius: 15px; transition: transform 0.3s ease, box-shadow 0.3s ease; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .product-card img { height: 200px; object-fit: cover; }
        .price-tag { font-size: 1.2rem; color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">متجر الملابس</a>
        <div class="d-flex">
            <a href="login.html" class="btn btn-outline-light me-2">دخول</a>
            <a href="signup.html" class="btn btn-primary">حساب جديد</a>
        </div>
    </div>
</nav>

<div class="hero">
    <div class="container">
        <h1 class="display-4 fw-bold">أحدث صيحات الموضة</h1>
        <p class="lead">اكتشف أفضل تشكيلة ملابس بجودة عالية وبأفضل الأسعار</p>
    </div>
</div>

<div class="container my-5">
    <h2 class="mb-4 fw-bold">منتجاتنا المميزة</h2>
    <div class="row row-cols-1 row-cols-md-3 g-4" id="products-container">
        
        <div class="col">
            <div class="card h-100 product-card shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top" alt="منتج">
                <div class="card-body">
                    <h5 class="card-title">تيشيرت صيفي</h5>
                    <p class="card-text text-muted">وصف بسيط للمنتج هنا ليعطي لمحة عن الخامة.</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="price-tag">250 جنيه</span>
                        <button class="btn btn-primary">إضافة للسلة</button>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجري</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container auth-page">
    <div class="card shadow p-4 auth-card">
        <h2 class="text-center mb-4">تسجيل الدخول</h2>
        <div id="login-alert" class="alert d-none" role="alert"></div>
        <form id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3 position-relative">
                <label for="password" class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="password" required>
                <button type="button" class="btn btn-sm btn-outline-secondary password-toggle" data-target="password">إظهار</button>
            </div>
            <button type="submit" class="btn btn-primary w-100">دخول</button>
        </form>
        <div class="text-center mt-3">
            <a href="/signup" class="text-decoration-none">ليس لديك حساب؟ إنشاء حساب جديد</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - متجري</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container auth-page">
    <div class="card shadow p-4 auth-card">
        <h2 class="text-center mb-4">إنشاء حساب جديد</h2>
        <div id="signup-alert" class="alert d-none" role="alert"></div>
        <form id="signup-form">
            <div class="mb-3">
                <label for="name" class="form-label">الاسم الكامل</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3 position-relative">
                <label for="password" class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="password" required>
                <button type="button" class="btn btn-sm btn-outline-secondary password-toggle" data-target="password">إظهار</button>
            </div>
            <div class="mb-3 position-relative">
                <label for="confirm_password" class="form-label">تأكيد كلمة المرور</label>
                <input type="password" class="form-control" id="confirm_password" required>
                <button type="button" class="btn btn-sm btn-outline-secondary password-toggle" data-target="confirm_password">إظهار</button>
            </div>
            <button type="submit" class="btn btn-success w-100">إنشاء الحساب</button>
        </form>
        <div class="text-center mt-3">
            <p>لديك حساب بالفعل؟ <a href="/login" class="text-decoration-none">سجل دخولك هنا</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>

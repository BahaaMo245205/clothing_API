<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - متجري</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .signup-container { max-width: 450px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container signup-container">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">إنشاء حساب جديد</h2>
        
        <form action="/signup" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">الاسم الكامل</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">تأكيد كلمة المرور</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            
            <button id="show-password" class="btn btn-success w-100 mb-3">Show</button>
            <button type="submit" class="btn btn-success w-100">إنشاء الحساب</button>
        </form>

        <div class="text-center mt-3">
            <p>لديك حساب بالفعل؟ <a href="login.html" class="text-decoration-none">سجل دخولك هنا</a></p>
        </div>
    </div>
</div>

</body>
</html>
